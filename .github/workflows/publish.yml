name: Publish

# Publishes to npm with provenance when a GitHub Release is published.
# Cut a release from a tag (e.g. v1.0.0) after bumping the version in
# package.json and merging to main.

on:
  release:
    types: [published]
  workflow_dispatch: {}   # manual "Run workflow" button (publishes package.json's current version)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout
      id-token: write     # OIDC token for npm provenance (see README)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
